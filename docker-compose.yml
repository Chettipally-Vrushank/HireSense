version: "3.9"

services:
  # ──────────────────────────────────────────────
  # AI Services (FastAPI / Python) — main backend
  # ──────────────────────────────────────────────
  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: hiresense-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - JWT_EXPIRE_MINUTES=${JWT_EXPIRE_MINUTES:-60}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - GOOGLE_PROJECT_ID=${GOOGLE_PROJECT_ID}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/hiresense-487704-5ce7b1e10386.json
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
    volumes:
      - ai_pdfs:/app/generated_pdfs
    networks:
      - hiresense-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/docs" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s

  # ──────────────────────────────────────────────
  # Frontend (Next.js)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=http://ai-services:8000
    container_name: hiresense-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://ai-services:8000
    networks:
      - hiresense-net
    depends_on:
      ai-services:
        condition: service_healthy

# ──────────────────────────────────────────────
# Shared volumes
# ──────────────────────────────────────────────
volumes:
  ai_pdfs:

    # ──────────────────────────────────────────────
    # Internal network
    # ──────────────────────────────────────────────
networks:
  hiresense-net:
    driver: bridge
